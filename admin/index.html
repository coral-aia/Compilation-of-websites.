<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵感网站建设域 · 后台管理</title>
    <!-- 加载 Decap CMS -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        #cms-root {
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <!-- 明确指定 CMS 挂载的容器 -->
    <div id="cms-root"></div>
    <script>
        // 等待页面和 CMS 脚本都加载完成
        window.CMS_MANUAL_INIT = true;
        
        function initCMS() {
            if (window.CMS) {
                // 获取挂载点
                const root = document.getElementById('cms-root');
                if (!root) {
                    console.error('挂载点 #cms-root 不存在');
                    return;
                }
                // 初始化 CMS，直接挂载到 root
                window.CMS.init();  // Decap CMS 会自动从 /admin/config.yml 加载，自动挂载到页面
            } else {
                console.warn('Decap CMS 尚未加载，等待中...');
                setTimeout(initCMS, 200);
            }
        }
        
        // 如果脚本已经加载完成，立即初始化；否则等待 load 事件
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initCMS);
        } else {
            initCMS();
        }
    </script>
</body>
</html>
